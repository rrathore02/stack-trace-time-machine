name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev + web deps
        # Install [web] too so the FastAPI smoke tests aren't silently skipped.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Configure git for tests
        # The tiny_repo fixture creates real git history, which requires a
        # global identity to be set on the runner.
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
          git config --global commit.gpgsign false

      - name: Run tests
        run: pytest -q
